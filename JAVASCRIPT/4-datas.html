<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datas</title>
</head>
<body>
    <script>
        // Objeto Date()
        // O objeto Date é usado para representar datas e horários. 
        // Ele permite criar, manipular e formatar datas.


        diaAtual = new Date();
        console.log(diaAtual); // exibe o dia atual


        // Data especifica (ano,mes,dia,hora,minuto,segundo)
        dataEspecifica = new Date(2023,9,15,14,30,0);
        console.log(dataEspecifica);

        d = 14 + 3;

        dataString = new Date(`2023-10-15T${d}:30:00Z`);// formato ISO 8601
        console.log(dataString)


        dataString2 = new Date(`2023-10-15T14:30:00`);// formato ISO 8601
        console.log(dataString2)


        dataString3 = new Date(`2023-10-15T14:30:00Z`);// formato ISO 8601
        console.log(dataString3.getHours())
        console.log(dataString3.getUTCHours())

        // Metodos úteis do Date();

        console.log('-----------');

        console.log(diaAtual.getFullYear());//retorna o ano (4 digitos)

        console.log(diaAtual.getMonth());//retorna o mês (0-11) onde 0 é janeiro

        let meses = [
            "Janeiro",
            "Fevereiro",
            "Março",
            "Abril",
            "Maio",
            "Junho",
            "Julho",
            "Agosto",
            "Setembro",
            "Outubro",
            "Novembro",
            "Dezembro"
        ]

        console.log(diaAtual.getMonth());
        console.log(meses[diaAtual.getMonth()]);


        let dataTexto = diaAtual.toLocaleDateString('pt-BR',{
            month: 'long'
        });
        console.log(dataTexto);

        dataTexto = dataTexto.charAt(0).toUpperCase() + dataTexto.slice(1);

        console.log(dataTexto);


        console.log(diaAtual.getDay())// retorna o dia da semana (0-6)

        console.log(diaAtual.getDate())// retorna o dia do mes (1-31)

        console.log(diaAtual.getHours())// retorna a hora(0-23)

        console.log(diaAtual.getMinutes())// retorna a minutos(0-59)

        console.log(diaAtual.getSeconds())// retorna a segundos(0-59)

        console.log(diaAtual.getMilliseconds()); //retorna os milissegundos (0-999) 

        console.log(diaAtual.getTime()) // retorna o timestamp (milissegundos desde 1º de janeiro de 1970)


        dataTexto = diaAtual.toLocaleDateString('pt-BR',{
            // month: 'long'// mostrar junho
            // month: 'numeric'// mostrar numeral
            // month: '2-digit'// mostrar numeral com 2 digitos - zero a esquerda
            // month: 'short'// mostrar de forma abreviada (jun)
            month: 'narrow'// a nenor versão possivel, geramente apenas a primeira letra (j)

        });
        console.log(dataTexto);


        // Timestamp
        // o timestamp é um número que representa a quantidade de milissegundo desde 1º de janeiro de 1970 (conhecido como 'UNIX Epoch')

        // obter o timestamp
        console.log(diaAtual.getTime());

        console.log(Date.now())// retorna o timestamp atual

        // convertendo timestamp para data

        let timestamp = Date.now();
        let data = new Date(timestamp);

        console.log(data)

        // formatação de datas 
        // no javascrip não temos um função nativa para formatar datas de maneira amigavel (13/06/2026)
        // mas voce pode usar metodos do objeto Date() para criar seu proprio formato

        let dataAtual = new Date();
        let dia = dataAtual.getDate();
        let mes = dataAtual.getMonth() + 1;
        let ano = dataAtual.getFullYear();

        let dataFormatada = `${dia}/${mes}/${ano}`;
        console.log(dataFormatada);

        // diferença entre datas
        // voce pode calcular a diferença entre duas datas subtraindo seus timestamp

        let data1 = new Date(2026,5,10);
        let data2 = new Date(2026,5,13);

        let diferenca = data2 - data1;
        console.log(diferenca);

        let dias = diferenca / (1000 * 60 * 60 * 24);// converte para dias
        console.log(dias);

        // fusos horarios (time zones)
        // O objeto Date() trabalha com o fuso horario local do sistema. para trabalhar com fusos horarios especificos, voce pode usar bibliotecas com Luxon 

        date = new Date();
        formatador = new Intl.DateTimeFormat('pt-BR',{
        // formatador = new Intl.DateTimeFormat('en-US',{
            timeZone:'America/Sao_Paulo',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        console.log(formatador.format(date)) // exibe a hora no fuso horario de são paulo


        

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de repetição</title>
</head>

<body>
    <script>
        console.log('Passo 1')
        console.log('Passo 2')
        console.log('Passo 3')
        console.log('Passo 4')
        console.log('Passo 5')
        console.log('Passo 6')
        console.log('Passo 7')
        console.log('Passo 8')
        console.log('Passo 9')
        console.log('Passo 10')

        // for (para)

        // for(inicialização,condição,incremento){
        //     // codigo a ser repetido
        // }

        for (let i = 0; i <= 10; i++) { // i = i+1
            console.log('passo' + i)
        }

        // fluxo de execução
        // cria i = 1
        // verifica se i <=10
        // executa o bloco
        // incrementa 1 no i (i++)
        // volta para a condição
        // repete até a condição ser falsa

        let numero = 5;

        for (let i = 0; i <= 10; i++) {
            // console.log(numero + " x " + i + " = " + (numero*i))
            console.log(`${numero} x ${i} = ${numero * i}`)
        }


        let soma = 0;

        for (let i = 1; i <= 10; i++) {
            soma += i;  // soma = soma + i;       
        }

        console.log(soma);

        //      0        1         2       3
        let nomes = ['Diego', 'Jhenny', 'João', 'Maria', 'Romeu', 'Julieta'];
        console.log(nomes.length)

        for (let i = 0; i < nomes.length; i++) {
            console.log(nomes[i])
        }

        // exiba os numeros de 1 a 20
        for (let i = 1; i <= 20; i++) {//i = i + 1
            console.log(i)
        }

        // exiba os numeros de 20 a 1
        for (let i = 20; i >= 1; i--) {//i = i - 1
            console.log(i)
        }
        console.log('-----------------')
        // exiba apenas os numeros pares de 0 a 50
        for (let i = 0; i <= 50; i += 2) {//i = i + 2
            console.log(i)
        }

        // entrada de dados pelo usuario 
        // peça a o usurio um numero e mostre a tabuada deste numero

        let n = prompt('Digite um numero para mostrar a tabuada!');


        for (let i = 1; i <= 10; i++) {
            console.log(n + ' x ' + i + ' = ' + (n * i))
            console.log(`${n} x ${i} = ${n * i}`)
        }


        // crie um programa que exiba a seguinte saida
        // *
        // **
        // ***
        // ****
        // *****

        for (let linha = 1; linha <= 5; linha++) {
            // console.log(linha)
            let estrela = "";

            for (let coluna = 1; coluna <= linha; coluna++) {
                // console.log(coluna)
                estrela += "*";
            }
            console.log(estrela)
        }



        console.log('Asteriscos:');
        let asteriscos = '*';
        for (let index = 0; index < 5; index++) {
            console.log(asteriscos);
            asteriscos += '*';

        }

        console.log('Asteriscos:');
        asteriscos = '*';
        for (let index = 1; index <= 5; index++) {

            asteriscos += '*';
            console.log(asteriscos);

        }


        // while 
        let i = 0
        while (i <= 10) {
            console.log(i)
            i++
        }

        for (let i = 0; i <= 10; i++) {
            console.log(i)
        }

        console.log('------do while--------')

        // do while
        i = 0;

        do {
            console.log(i);
            i++;
        } while (i <= 10)

        // forEach
        console.log('-------forEach--------')
        let numeros = [0,'carro',2,3,'moto',5,6,true,8,9,10.6]

        console.log(numeros)

     
         numeros.forEach(function(numero) {
             console.log(numero)
         });

         numeros.forEach(numero =>{
            console.log(numero)
         } );

         let texto = "Olá mundo!";

         texto.split('').forEach(function(letra){
            console.log(letra)
         });

         let palavra = texto.split(" ");
         console.log(palavra)




    

    </script>
</body>

</html>

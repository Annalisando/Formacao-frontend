<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opedadores lógico</title>
</head>
<body>
    <script>
        // Operadores lógicos
        // Esses operadores são usados para combinar expressões lógicas

        //operador logico E (&&): Retorna verdeiro se ambas as expressões forem verdadeiras

        let nome = 'maria';
        let senha = 1234

        let resultado = nome == 'maria' && senha === '1234'
        console.log(resultado)

        //operador logico OU (||): Retorna verdadeiro se pelo menos uma espressão for verdadeira

        resultado = nome == 'diego' || senha == 1234
    </script>
</body>
</html>

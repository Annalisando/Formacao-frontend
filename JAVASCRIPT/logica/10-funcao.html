        // Atividade

        //pedir para o usuario o tipo de calculo que ele quer fazer
        //(+, -, *,/)

        //pedir o primeiro numrero
        //pedir o segundo numero
        //e mostrar o resultado

        //criar função para soma, divisão,subtração e multiplicação

        let operacao = prompt('Digite a operação que deseja realizar (+, -, *, /):');
        let num1 = parseFloat(prompt('Digite o primeiro número:'));
        let num2 = parseFloat(prompt('Digite o segundo número:'));

        function calcular(operacao, num1, num2) {
            if (operacao === '+') {
                return num1 + num2;
            } else if (operacao === '-') {
                return num1 - num2;
            } else if (operacao === '*') {
                return num1 * num2;
            } else if (operacao === '/') {
                return num1 / num2;
            } else {
                return 'Operação inválida!';
            }
        }

        let resultado = calcular(operacao, num1, num2);
        document.write('O resultado é: ' + resultado);
    </script>
